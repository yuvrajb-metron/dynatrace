name: com.dynatrace.extension.harbor
# name: custom:harbor-extension
version: 1.0.11
minDynatraceVersion: 1.318.0
minEECVersion: 1.299.0
author:
  name: "Dynatrace"

documents:
  dashboards:
    - displayName: Runtime contextualization of container findings for alert reduction
      path: documents/runtime_contextualization_containers.dashboard.json
    - displayName: Security product coverage
      path: documents/security_product_coverage.dashboard.json
    - displayName: Container images scan coverage
      path: documents/container_scan_coverage.dashboard.json
    - displayName: Vulnerability findings
      path: documents/vulnerability_findings.dashboard.json
    - displayName: Container vulnerability findings
      path: documents/container_vulnerability_findings.dashboard.json

python:
  runtime:
    module: harbor_extension
    version:
      min: "3.10"

  activation:
    remote:
      path: activationSchema.json
keywords:
  - title:harbor
  - category:security
  - tech:registry
  - vendor:harbor
  - icon:extensions
  - entity:None
