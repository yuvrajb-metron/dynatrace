name: com.dynatrace.extension.dockerscout
version: 1.0.2
minDynatraceVersion: 1.331.0
author:
  name: "Dynatrace"

keywords:
  - title:dockerscout
  - category:security
  - tech:security
  - vendor:docker
  - icon:extensions
  - entity:None

documents:
  dashboards:
    - displayName: Security product coverage
      path: documents/security_product_coverage.dashboard.json
    - displayName: Vulnerability findings
      path: documents/vulnerability_findings.dashboard.json

python:
  runtime:
    module: appsec_dockerscout
    version:
      min: "3.10"

  activation:
    remote:
      path: activationSchema.json
