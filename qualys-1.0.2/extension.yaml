name: com.dynatrace.extension.qualys
version: 1.0.2
# name: custom:qualys-appsec
# version: 0.0.19
minDynatraceVersion: 1.310.0
author:
  name: "Dynatrace"

documents:
  dashboards:
    - displayName: Runtime contextualization of host findings for alert reduction
      path: documents/host-vulnerability-findings-alert-reduction.dashboard.json
    - displayName: Security product coverage
      path: documents/security_product_coverage.dashboard.json
    - displayName: Vulnerability findings
      path: documents/vulnerability_findings.dashboard.json
python:
  runtime:
    module: qualys_appsec
    version:
      min: "3.10"

  activation:
    remote:
      path: activationSchema.json

keywords:
  - title:qualys
  - category:security
  - tech:security
  - vendor:qualys
  - icon:extensions
  - entity:None
