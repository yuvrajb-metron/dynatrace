name: com.dynatrace.extension.tenable
version: 1.6.0
# name: custom:appsec-tenable
# version: 1.4.2
minDynatraceVersion: 1.318.0
minEECVersion: 1.299.0
author:
  name: "Dynatrace"

keywords:
  - title:tenable
  - category:security
  - tech:security
  - vendor:tenable
  - icon:extensions
  - entity:None

documents:
  dashboards:
    - displayName: Runtime contextualization of host findings for alert reduction
      path: documents/host-vulnerability-findings-alert-reduction.dashboard.json
    - displayName: Security product coverage
      path: documents/security-product-coverage-security-events.dashboard.json
    - displayName: Vulnerability findings
      path: documents/vulnerability-findings-security-events.dashboard.json
    - displayName: Track remediation with vulnerability scans
      path: documents/track-remediation-with-vulnerability-scans.dashboard.json

python:
  runtime:
    module: appsec_tenable
    version:
      min: "3.10"

  activation:
    remote:
      path: activationSchema.json
